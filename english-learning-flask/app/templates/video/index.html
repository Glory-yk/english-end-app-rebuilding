{% extends 'base.html' %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">Videos to Learn From</h1>
        <a href="{{ url_for('video.add') }}" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
            + Add New Video
        </a>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        {% for video in videos %}
        <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition-shadow">
            <a href="{{ url_for('video.detail', video_id=video.id) }}">
                <img src="{{ video.thumbnail_url }}" alt="{{ video.title }}" class="w-full h-48 object-cover">
                <div class="p-4">
                    <h3 class="font-bold text-lg mb-1 line-clamp-2">{{ video.title }}</h3>
                    <p class="text-gray-600 text-sm">{{ video.channel_name }}</p>
                </div>
            </a>
        </div>
        {% else %}
        <p class="col-span-full text-center text-gray-500 py-12">No videos added yet. Try adding one!</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
