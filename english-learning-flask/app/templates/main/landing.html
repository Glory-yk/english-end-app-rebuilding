{% extends 'base.html' %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center bg-blue-50">
    <div class="text-center">
        <h1 class="text-6xl font-black text-blue-900 mb-6">Master English through YouTube</h1>
        <p class="text-xl text-gray-700 mb-10 max-w-2xl mx-auto">Learn vocabulary, practice speaking, and track your progress with our AI-powered language learning platform.</p>
        <div class="space-x-4">
            <a href="{{ url_for('auth.register') }}" class="bg-blue-600 text-white font-bold py-4 px-8 rounded-full text-lg shadow-lg hover:bg-blue-700 transition transform hover:-translate-y-1">Start Learning Now</a>
            <a href="{{ url_for('auth.login') }}" class="bg-white text-blue-600 font-bold py-4 px-8 rounded-full text-lg shadow-lg hover:bg-gray-50 transition">Log In</a>
        </div>
    </div>
</div>
{% endblock %}
