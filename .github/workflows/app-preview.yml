name: App Preview

on:
  pull_request:
    branches: [main]
    paths:
      - 'english-learning-app/**'

jobs:
  preview:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: english-learning-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: english-learning-app/package-lock.json

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: npm ci

      - name: Build Preview
        run: eas build --platform all --profile preview --non-interactive

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📱 Preview build started! Check [EAS Dashboard](https://expo.dev) for QR code.'
            })
