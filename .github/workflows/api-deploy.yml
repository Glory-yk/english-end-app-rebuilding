name: API Deploy

on:
  push:
    branches: [main]
    paths:
      - 'english-learning-api/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []

    defaults:
      run:
        working-directory: english-learning-api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: english-learning-api/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      # Railway deployment
      - name: Deploy to Railway
        if: success()
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: english-learning-api
